<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>
  
  <!-- Arrow shaft -->
  <rect x="6" y="2" width="2" height="16" fill="#0f1720"/>
  <rect x="8" y="4" width="2" height="12" fill="#0f1720"/>
  <rect x="10" y="6" width="2" height="8" fill="#0f1720"/>
  
  <!-- Arrow point (triangular) -->
  <rect x="2" y="14" width="2" height="2" fill="#0f1720"/>
  <rect x="4" y="14" width="2" height="2" fill="#0f1720"/>
  <rect x="6" y="14" width="2" height="2" fill="#0f1720"/>
  <rect x="8" y="12" width="2" height="2" fill="#0f1720"/>
  <rect x="4" y="16" width="2" height="2" fill="#0f1720"/>
  <rect x="6" y="18" width="2" height="2" fill="#0f1720"/>
  
  <!-- Gold accent (right side of arrow) -->
  <rect x="8" y="2" width="2" height="16" fill="#d8b66e"/>
  <rect x="10" y="4" width="2" height="12" fill="#d8b66e"/>
  <rect x="12" y="6" width="2" height="8" fill="#d8b66e"/>
  
  <!-- Gold accent on point -->
  <rect x="8" y="14" width="2" height="2" fill="#d8b66e"/>
  <rect x="10" y="12" width="2" height="2" fill="#d8b66e"/>
  <rect x="6" y="16" width="2" height="2" fill="#d8b66e"/>
  <rect x="8" y="18" width="2" height="2" fill="#d8b66e"/>
</svg>
