<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Blade point (sharp triangular tip at TOP - no stroke) -->
  <polygon points="16,0 12,6 20,6" fill="#ffffff" stroke="none"/>
  
  <!-- Blade (long vertical white with black outline) -->
  <rect x="13" y="6" width="6" height="16" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  
  <!-- Guard (gold tsuba) -->
  <rect x="9" y="22" width="14" height="2" fill="#d8b66e" stroke="#000000" stroke-width="1"/>
  
  <!-- Handle (brown rectangle) -->
  <rect x="10" y="24" width="12" height="6" fill="#8b6f47" stroke="#000000" stroke-width="1"/>
</svg>