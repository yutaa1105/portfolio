<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>
  
  <!-- Palm base -->
  <rect x="4" y="6" width="2" height="16" fill="#0f1720"/>
  <rect x="6" y="4" width="2" height="18" fill="#0f1720"/>
  <rect x="8" y="2" width="2" height="20" fill="#0f1720"/>
  <rect x="10" y="4" width="2" height="18" fill="#0f1720"/>
  
  <!-- Thumb -->
  <rect x="2" y="8" width="2" height="6" fill="#0f1720"/>
  <rect x="0" y="12" width="2" height="2" fill="#0f1720"/>
  
  <!-- Fingers -->
  <rect x="12" y="2" width="2" height="6" fill="#0f1720"/>
  <rect x="14" y="4" width="2" height="6" fill="#0f1720"/>
  <rect x="16" y="6" width="2" height="8" fill="#0f1720"/>
  
  <!-- Gold accent highlights -->
  <rect x="8" y="4" width="2" height="2" fill="#d8b66e"/>
  <rect x="10" y="6" width="2" height="2" fill="#d8b66e"/>
  <rect x="12" y="8" width="2" height="2" fill="#d8b66e"/>
  <rect x="14" y="10" width="2" height="2" fill="#d8b66e"/>
  <rect x="16" y="12" width="2" height="2" fill="#d8b66e"/>
  
  <!-- Accent on thumb -->
  <rect x="2" y="10" width="2" height="2" fill="#d8b66e"/>
</svg>
